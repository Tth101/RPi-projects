services:
  dashboard:
      build:
      # build context should be the current directory instead of /src since by setting /src we 
      # reduce the scope and are unable to copy the static, certs and yaml file into the 
      # container
        context: .
        dockerfile: dockerfile

      container_name: homedashboard

      volumes:
      #Make sure homeDashboard.db is created/exists before running the container, otherwise it will create a dir and cause db reading issues
        - /home/Tth/Databases/homeDashboard.db:/PiDashboard/database.db
      
      networks:
        - traefik
        - dns_net

      dns:
        - 172.18.0.2

      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik"
        - "traefik.http.routers.homeDashboard.rule=Host(`dashboard.rpi.home.arpa`)"
        - "traefik.http.services.homeDashboard.loadbalancer.server.port=8080"

      restart: unless-stopped

networks:
  traefik:
    external: true
  dns_net:
    external: true